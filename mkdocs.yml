site_name: jIab-b
site_url: https://jIab-b.github.io/
theme:
  name: material
  palette:
    scheme: default
    primary: teal
    accent: teal
  font:
    text: Roboto
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
